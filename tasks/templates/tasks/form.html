{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<h1 class="my-4">
    {% if form.instance.pk %}Изменение задачи{% else %}Создание задачи{% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            {% bootstrap_field field show_help=False %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">
        {% if form.instance.pk %}Изменить{% else %}Создать{% endif %}
    </button>
</form>
{% endblock %}
