{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">{% if form.instance.pk %}Изменение статуса{% else %}Создание статуса{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        {{ form.as_p }}
    </div>
    <button class="btn btn-primary" type="submit">
        {% if form.instance.pk %}Изменить{% else %}Создать{% endif %}
    </button>
</form>
{% endblock %}
